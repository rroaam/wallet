name: Wallet
options:
  bundleIdPrefix: com.designwithroam
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Wallet-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Wallet/Core
      - path: Wallet/macOS
      - path: Wallet/Shared
      - path: Wallet/WalletApp.swift
    info:
      path: Wallet/macOS/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Wallet
        CFBundleIdentifier: com.designwithroam.wallet
        LSMinimumSystemVersion: "14.0"
        NSAccessibilityUsageDescription: "Wallet needs accessibility access to detect which app you're using and automatically provide relevant context."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.designwithroam.wallet
        PRODUCT_NAME: Wallet
        INFOPLIST_KEY_LSUIElement: YES

  Wallet-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Wallet/Core
      - path: Wallet/iOS
      - path: Wallet/Shared
      - path: Wallet/WalletApp.swift
    info:
      path: Wallet/iOS/Info.plist
      properties:
        CFBundleDisplayName: Wallet
        CFBundleIdentifier: com.designwithroam.wallet.ios
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.designwithroam.wallet.ios
        PRODUCT_NAME: Wallet
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_ROTATION: true

  WalletTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WalletTests
    dependencies:
      - target: Wallet-macOS
